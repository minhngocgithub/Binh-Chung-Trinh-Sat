events {
    worker_connections 1024;
}

http {
    # HTTP (port 80) — vẫn giữ để phục vụ renew cert sau này (certbot
    # cần request tới /.well-known/acme-challenge/ qua HTTP mỗi lần
    # renew), mọi request khác redirect sang HTTPS.
    server {
        listen 80;
        server_name trinhsattuyendau.sportaiv.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── GIAI ĐOẠN 2 — HTTPS thật, dùng cert Let's Encrypt ─────────────
    server {
        listen 443 ssl;
        server_name trinhsattuyendau.sportaiv.com;

        ssl_certificate     /etc/letsencrypt/live/trinhsattuyendau.sportaiv.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/trinhsattuyendau.sportaiv.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Cần cho Telegram Trigger / Wait webhook và các kết nối
            # dài (n8n dùng WebSocket cho editor real-time)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}