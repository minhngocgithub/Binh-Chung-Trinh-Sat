events {
    worker_connections 1024;
}

http {
    # ─── GIAI ĐOẠN 1 (BOOTSTRAP) — chỉ HTTP, chưa có SSL ───────────────
    # Mục đích: phục vụ file xác thực .well-known/acme-challenge/ để
    # certbot xin cert lần đầu. Sau khi có cert, file này sẽ được thay
    # bằng bản HTTPS đầy đủ (giai đoạn 2).
    server {
        listen 80;
        server_name trinhsattuyendau.sportaiv.com;

        # Certbot webroot challenge — PHẢI giữ nguyên đường dẫn này
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Tạm thời proxy mọi request khác vào n8n qua HTTP, để domain
        # vẫn dùng được trong lúc chờ SSL (không bắt buộc, chỉ tiện test)
        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}