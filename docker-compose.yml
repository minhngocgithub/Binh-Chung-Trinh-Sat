services:
  # ─── n8n — orchestrator, PUBLIC port 5678 ───────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${WEBHOOK_URL}
      # Bắt buộc vì kiến trúc không dùng nginx/HTTPS (quyết định của
      # manager) — n8n mặc định yêu cầu secure cookie (chỉ hoạt động
      # qua https), nếu không tắt sẽ không đăng nhập được qua http.
      - N8N_SECURE_COOKIE=false
      # KHÔNG set N8N_ENCRYPTION_KEY ở đây — n8n-data/config đã có sẵn
      # encryptionKey (copy từ máy cũ qua SCP), set đè có thể làm n8n
      # không đọc được credentials cũ đã lưu trong database.sqlite.
    volumes:
      - ./n8n-data:/home/node/.n8n
    depends_on:
      - redis-2
      - ai-core
      - weaver-api
    networks:
      - bcts-network

  # ─── redis — cache riêng cho weaver-api ─────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - bcts-network

  # ─── redis-2 — dùng bởi n8n (queue/cache riêng) ─────────────────────
  redis-2:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis2-data:/data
    networks:
      - bcts-network

  # ─── weaver-api — enrich (chỉ crawl httpx+BeautifulSoup, đã bỏ LLM
  #     fallback vì 9router bị loại khỏi kiến trúc), KHÔNG public port ─
  #     Không cần env_file: services.py có guard "if not NINE_ROUTER_
  #     API_KEY" nên tự skip nhánh gọi 9router khi thiếu key (an toàn).
  weaver-api:
    build:
      context: ./weaver-api
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - bcts-network

  # ─── discord-bot — Node.js, KHÔNG public port ───────────────────────
  discord-bot:
    build:
      context: ./discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      # PHẢI tên là N8N_WEBHOOK (khớp bot.js: process.env.N8N_WEBHOOK),
      # là URL ĐẦY ĐỦ kèm path /webhook/discord — khác với WEBHOOK_URL
      # của service n8n ở trên (n8n dùng biến đó cho mục đích khác).
      - N8N_WEBHOOK=${N8N_WEBHOOK}
    depends_on:
      - n8n
    networks:
      - bcts-network

  # ─── ai-core — FastAPI/Pydantic AI (Scorer + Writer), KHÔNG public port
  ai-core:
    build:
      context: ./ai-core
    restart: unless-stopped
    env_file:
      - ./ai-core/.env
    depends_on:
      - redis
    networks:
      - bcts-network

networks:
  bcts-network:
    driver: bridge

volumes:
  redis-data:
  redis2-data: