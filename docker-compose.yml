services:
  # ─── nginx — reverse proxy, GIAI ĐOẠN 1: chỉ HTTP (port 80) để xin
  #     SSL cert. Sau khi có cert sẽ nâng cấp config sang HTTPS (443). ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot-webroot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - n8n
    networks:
      - bcts-network

  # ─── n8n — orchestrator ──────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${WEBHOOK_URL}
      # Giờ đã có HTTPS thật qua nginx (Let's Encrypt) nên bật lại
      # secure cookie theo đúng khuyến nghị bảo mật của n8n.
      - N8N_SECURE_COOKIE=true
      # KHÔNG set N8N_ENCRYPTION_KEY ở đây — n8n-data/config đã có sẵn
      # encryptionKey (copy từ máy cũ qua SCP), set đè có thể làm n8n
      # không đọc được credentials cũ đã lưu trong database.sqlite.
    volumes:
      - ./n8n-data:/home/node/.n8n
    depends_on:
      - redis-2
      - ai-core
      - weaver-api
    networks:
      - bcts-network

  # ─── redis — cache riêng cho weaver-api ─────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - bcts-network

  # ─── redis-2 — dùng bởi n8n (queue/cache riêng) ─────────────────────
  redis-2:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis2-data:/data
    networks:
      - bcts-network

  # ─── weaver-api — enrich (chỉ crawl httpx+BeautifulSoup, đã bỏ LLM
  #     fallback vì 9router bị loại khỏi kiến trúc), KHÔNG public port ─
  #     Không cần env_file: services.py có guard "if not NINE_ROUTER_
  #     API_KEY" nên tự skip nhánh gọi 9router khi thiếu key (an toàn).
  weaver-api:
    build:
      context: ./weaver-api
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - bcts-network

  # ─── discord-bot — Node.js, KHÔNG public port ───────────────────────
  discord-bot:
    build:
      context: ./discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      # PHẢI tên là N8N_WEBHOOK (khớp bot.js: process.env.N8N_WEBHOOK).
      # Dùng hostname nội bộ "n8n" (tên service trong bcts-network) thay
      # vì IP public — nhanh hơn (không vòng qua internet) và vẫn chạy
      # được kể cả sau khi đóng port 5678 public.
      - N8N_WEBHOOK=http://n8n:5678/webhook/discord-ingest
    depends_on:
      - n8n
    networks:
      - bcts-network

  # ─── ai-core — FastAPI/Pydantic AI (Scorer + Writer), KHÔNG public port
  ai-core:
    build:
      context: ./ai-core
    restart: unless-stopped
    env_file:
      - ./ai-core/.env
    depends_on:
      - redis
    networks:
      - bcts-network

networks:
  bcts-network:
    driver: bridge

volumes:
  redis-data:
  redis2-data: