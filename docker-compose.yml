services:
  ai-core:
    build:
      context: ./ai-core
      dockerfile: Dockerfile
    container_name: sportaiv-ai-core
    ports:
      - "8000:8000"
    env_file:
      - ./ai-core/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s